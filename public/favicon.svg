<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark ledger panel backdrop so the gold seal reads at favicon sizes -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#2c2117" />
      <stop offset="100%" stop-color="#130f0a" />
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)" />

  <!-- Black Lion seal, matching the in-app <Seal> glyph (gold #c8aa6e) -->
  <g fill="none" stroke="#c8aa6e">
    <circle cx="50" cy="50" r="38" stroke-width="2" />
    <circle cx="50" cy="50" r="31" stroke-width="1" opacity="0.6" />
    <g stroke-width="2" stroke-linecap="round">
      <line x1="50" y1="12" x2="50" y2="21" />
      <line x1="50" y1="79" x2="50" y2="88" />
      <line x1="12" y1="50" x2="21" y2="50" />
      <line x1="79" y1="50" x2="88" y2="50" />
      <line x1="23.2" y1="23.2" x2="29.2" y2="29.2" />
      <line x1="70.8" y1="70.8" x2="76.8" y2="76.8" />
      <line x1="76.8" y1="23.2" x2="70.8" y2="29.2" />
      <line x1="29.2" y1="70.8" x2="23.2" y2="76.8" />
    </g>
  </g>
  <path d="M50 32 L60.5 50 L50 68 L39.5 50 Z" fill="#c8aa6e" opacity="0.9" />
  <circle cx="50" cy="50" r="4.5" fill="#130f0a" />
</svg>
